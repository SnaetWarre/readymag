<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Readymag iframe debug</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: #a3294b;
        color: #fff7fb;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .debug {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .panel {
        border: 2px solid #fff7fb;
        padding: 28px 34px;
        background: rgba(0, 0, 0, 0.18);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 34px;
      }

      p {
        margin: 8px 0;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <main class="debug">
      <div class="panel">
        <h1>IFRAME DEBUG PAGE</h1>
        <p id="status">JavaScript has not run yet.</p>
        <p id="time">0</p>
      </div>
    </main>
    <script>
      const status = document.querySelector("#status");
      const time = document.querySelector("#time");
      const started = Date.now();

      status.textContent = "JavaScript is running inside the iframe.";

      setInterval(() => {
        time.textContent = `${Math.round((Date.now() - started) / 1000)} seconds alive`;
      }, 250);
    </script>
  </body>
</html>
